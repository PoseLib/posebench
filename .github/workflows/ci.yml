name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Eigen3 dependency
      run: |
        sudo apt-get update && sudo apt-get install -y libeigen3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check formatting using ruff
      run: |
        ./scripts/ruff_format.sh
        git diff --exit-code || (echo "Code format check failed, run ./scripts/ruff_format.sh to fix it." && exit 1)

    - name: Run tests with pytest
      run: |
        pytest tests/ -v
